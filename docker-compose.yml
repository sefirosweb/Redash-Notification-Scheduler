# Entorno de desarrollo — solo backend con hot-reload
# El frontend se arranca por separado con: npm run dev
# Para producción usa la imagen pre-compilada: ghcr.io/sefirosweb/redash-notification-scheduler:latest

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - ./backend:/app          # hot-reload: cambios en código sin rebuild

volumes:
  sqlite_data:
