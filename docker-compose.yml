services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    expose:
      - "8000"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  sqlite_data:
